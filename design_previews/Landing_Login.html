<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CampusMatch | Welcome</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-lowest": "#0d0d1a",
                    "surface-container-high": "#292937",
                    "surface-dim": "#12121f",
                    "on-primary-fixed-variant": "#8d0051",
                    "error": "#ffb4ab",
                    "background": "#12121f",
                    "surface-bright": "#383847",
                    "on-tertiary-container": "#013200",
                    "outline": "#a88892",
                    "on-secondary-container": "#e299ff",
                    "on-primary-container": "#580030",
                    "tertiary": "#69df54",
                    "inverse-primary": "#b8006c",
                    "on-surface-variant": "#e1bdc8",
                    "surface-container-low": "#1a1a28",
                    "secondary-fixed-dim": "#ebb2ff",
                    "inverse-surface": "#e3e0f4",
                    "outline-variant": "#594048",
                    "error-container": "#93000a",
                    "on-surface": "#e3e0f4",
                    "on-error": "#690005",
                    "surface-variant": "#343342",
                    "surface-container-highest": "#343342",
                    "on-primary-fixed": "#3e0021",
                    "on-background": "#e3e0f4",
                    "secondary-fixed": "#f8d8ff",
                    "surface-tint": "#ffb0cc",
                    "tertiary-container": "#2ea620",
                    "on-tertiary-fixed": "#012200",
                    "on-tertiary-fixed-variant": "#035300",
                    "tertiary-fixed": "#85fd6d",
                    "on-primary": "#640038",
                    "surface": "#12121f",
                    "on-secondary-fixed-variant": "#721199",
                    "secondary-container": "#721199",
                    "on-secondary-fixed": "#320047",
                    "primary-container": "#ff46a0",
                    "primary": "#ffb0cc",
                    "surface-container": "#1e1e2c",
                    "inverse-on-surface": "#2f2f3d",
                    "primary-fixed-dim": "#ffb0cc",
                    "secondary": "#ebb2ff",
                    "tertiary-fixed-dim": "#69df54",
                    "primary-fixed": "#ffd9e4",
                    "on-tertiary": "#013a00",
                    "on-secondary": "#520071",
                    "on-error-container": "#ffdad6"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Noto Serif"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        h1, h2, h3 { font-family: 'Noto Serif', serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(52, 51, 66, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .glow-button {
            box-shadow: 0 0 20px rgba(255, 70, 160, 0.4);
        }
        .blob-pink {
            background: radial-gradient(circle, rgba(255, 70, 160, 0.15) 0%, rgba(255, 70, 160, 0) 70%);
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(80px);
            position: absolute;
        }
        .blob-purple {
            background: radial-gradient(circle, rgba(114, 17, 153, 0.15) 0%, rgba(114, 17, 153, 0) 70%);
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(80px);
            position: absolute;
        }
    </style>
</head>
<body class="bg-surface-container-lowest min-h-screen text-on-surface overflow-hidden relative selection:bg-primary-container selection:text-white">
<!-- Atmospheric Background Elements -->
<div class="blob-pink -top-20 -left-20"></div>
<div class="blob-purple bottom-0 right-0"></div>
<main class="relative z-10 min-h-screen flex items-center justify-center px-6">
<div class="w-full max-w-lg">
<!-- Glassmorphism Card -->
<div class="glass-card p-10 md:p-14 rounded-lg border border-outline-variant/10 shadow-[0_0_50px_rgba(0,0,0,0.3)]">
<!-- Branding Header -->
<header class="text-center mb-10">
<h1 class="text-5xl md:text-6xl font-bold italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-primary to-primary-container mb-3">
                        CampusMatch
                    </h1>
<p class="font-headline italic text-on-surface-variant text-lg tracking-wide">
                        Your campus. Your people. Your vibe.
                    </p>
</header>
<!-- Auth Mode Switcher -->
<nav class="flex justify-center mb-12 relative">
<div class="flex gap-10">
<button class="relative pb-2 text-primary font-semibold tracking-wider">
                            Login
                            <span class="absolute bottom-0 left-0 w-full h-[3px] bg-gradient-to-r from-primary to-primary-container rounded-full"></span>
</button>
<button class="pb-2 text-on-surface/50 font-medium tracking-wider hover:text-on-surface transition-colors">
                            Sign Up
                        </button>
</div>
</nav>
<!-- Form Section -->
<form class="space-y-8" onsubmit="return false;">
<div class="space-y-6">
<!-- Email Input -->
<div class="group relative">
<label class="block text-xs font-bold uppercase tracking-[0.2em] text-primary/80 mb-2 ml-1">University Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline/60 group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full bg-surface-container-low/50 border-none rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/40 focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-high transition-all" placeholder="yourname@college.edu.in" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="group relative">
<div class="flex justify-between items-end mb-2">
<label class="block text-xs font-bold uppercase tracking-[0.2em] text-primary/80 ml-1">Password</label>
<a class="text-[10px] uppercase font-bold text-outline hover:text-primary transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline/60 group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-surface-container-low/50 border-none rounded-xl py-4 pl-12 pr-12 text-on-surface placeholder:text-outline/40 focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-high transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline/60 hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
</div>
<!-- CTA Button -->
<button class="w-full glow-button bg-gradient-to-br from-primary to-primary-container py-5 rounded-full text-on-primary font-bold text-lg tracking-widest hover:scale-[1.02] active:scale-95 transition-all flex justify-center items-center gap-3">
                        ENTER CAMPUS
                        <span class="material-symbols-outlined">arrow_right_alt</span>
</button>
</form>
<!-- Footer Restriction Note -->
<footer class="mt-10 text-center">
<div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-tertiary/10 border border-tertiary/20">
<span class="w-2 h-2 rounded-full bg-tertiary animate-pulse"></span>
<span class="text-xs font-semibold text-tertiary tracking-wide">
                            Only @college.edu.in emails allowed.
                        </span>
</div>
</footer>
</div>
<!-- Social/Secondary Proof -->
<div class="mt-12 flex justify-center gap-8 opacity-40 grayscale hover:grayscale-0 hover:opacity-100 transition-all duration-700">
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface">shield_person</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest">Verified</span>
</div>
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface">security</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest">Encrypted</span>
</div>
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface">school</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest">Exclusive</span>
</div>
</div>
</div>
</main>
<!-- Navigation suppression check: This is a focused login screen, no Shell Nav components are rendered as per the "Destination" rule. -->
</body></html>
